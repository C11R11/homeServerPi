---
- name: Deploy Development Stack
  hosts: all, localhost
  connection: "{{ 'local' if inventory_hostname == 'localhost' else 'smart' }}"
  gather_facts: no
  
  vars:
    # deploy_path MUST be defined in the environment or passed as an extra var
    deploy_path: "{{ lookup('env', 'DEPLOY_PATH') }}"
    compose_src: "docker-compose.yml"
    env_src: ".env"

  tasks:
    - name: Ensure development directory exists
      file:
        path: "{{ deploy_path }}"
        state: directory
        mode: '0755'

    - name: Copy Dev Compose blueprint and environment
      copy:
        src: "{{ item.src }}"
        dest: "{{ deploy_path }}/{{ item.dest }}"
      loop:
        - { src: "{{ compose_src }}", dest: "docker-compose.yml" }
        - { src: "{{ env_src }}", dest: ".env" }

    - name: Bring Dev stack up
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_path }}"
        env_files:
          - "{{ deploy_path }}/.env"
        state: present
        pull: always
