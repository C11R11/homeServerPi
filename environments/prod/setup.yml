---
- name: Provision Bare-Metal Layer 0
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    # Required variables passed via --extra-vars
    mount_usb_drive: "{{ lookup('env', 'MOUNT_USB_DRIVE') | default(MOUNT_USB_DRIVE, true) }}"
    ssd_uuid: "{{ lookup('env', 'SSD_UUID') | default(SSD_UUID, true) }}"
    target_user: "pi"

  tasks:
    - name: 1. System Updates
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes

    - name: 2. Storage Provisioning
      block:
        - name: Ensure mount point directory exists
          file:
            path: "{{ mount_usb_drive }}"
            state: directory
            mode: '0755'

        - name: Ensure SSD is formatted as ext4
          filesystem:
            fstype: ext4
            dev: "/dev/disk/by-uuid/{{ ssd_uuid }}"

        - name: Mount SSD permanently via fstab
          mount:
            path: "{{ mount_usb_drive }}"
            src: "UUID={{ ssd_uuid }}"
            fstype: ext4
            state: mounted
            opts: defaults,noatime

    - name: 3. Install Dependencies
      apt:
        name:
          - curl
          - git
          - htop
          - ufw
        state: present

    - name: 4. Docker Engine & Compose Installation
      block:
        - name: Install Docker via official script
          shell: "curl -fsSL https://get.docker.com | sh"
          args:
            creates: /usr/bin/docker

        - name: Add target user to docker group
          user:
            name: "{{ target_user }}"
            groups: docker
            append: yes

        - name: Ensure Docker service is enabled and started
          systemd:
            name: docker
            enabled: yes
            state: started

    - name: 5. Security - UFW Configuration
      block:
        - name: Set UFW default policies
          ufw:
            state: enabled
            policy: deny
            direction: "{{ item }}"
          loop:
            - incoming
            - outgoing

        - name: Allow essential traffic (Layer 0)
          ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
          loop:
            - '22'  # SSH
            - '80'  # HTTP
            - '443' # HTTPS
