services:
  navidrome:
    image: deluan/navidrome:latest
    user: "${PUID}:${PGID}"
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    restart: unless-stopped
    volumes:
      - "${MOUNT_USB_DRIVE}/Music/navidrome/data:/data"
      - "${MOUNT_USB_DRIVE}/Music:/music:ro"
    deploy:
      resources:
        limits:
          memory: 1GB

  yubal:
    image: ghcr.io/guillevc/yubal:latest
    container_name: yubal
    ports:
      - "${YUBAL_PORT:-4000}:8000"
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      YUBAL_SCHEDULER_CRON: "${YUBAL_SCHEDULER_CRON:-0 0 * * *}"
      YUBAL_DOWNLOAD_UGC: "${YUBAL_DOWNLOAD_UGC:-false}"
      YUBAL_TZ: "${YUBAL_TZ:-UTC}"
    volumes:
      - "${MOUNT_USB_DRIVE}/Music:/app/data"
      - "${MOUNT_USB_DRIVE}/config/yubal:/app/config"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1GB
